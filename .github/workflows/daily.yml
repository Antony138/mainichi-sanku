name: daily

on:
  schedule:
    - cron: '0 21 * * *'   # 21:00 UTC = 06:00 JST
  workflow_dispatch:
    inputs:
      force:
        description: '强制重新生成今天（改语料后立即生效用）'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/**'
      - 'corpus/**'
      - '.github/workflows/daily.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install edge-tts

      - name: Generate today's scenario + audio
        run: python scripts/generate.py ${{ inputs.force && '--force' || '' }}

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data site/audio
          git diff --cached --quiet || git commit -m "daily: $(TZ=Asia/Tokyo date +%F)"
          git pull --rebase origin main
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
